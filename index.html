<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toi Ohomai Hub – Campus Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --toi-green: #00613C;
      --toi-green-light: #007A4C;
      --toi-gold: #F2A900;
      --toi-dark: #1A1A2E;
      --toi-bg: #F4F6F4;
      --toi-card: #ffffff;
      --toi-border: #D8E4DC;
      --pin-default: #00613C;
      --pin-highlight: #F2A900;
      --pin-shadow: rgba(0,97,60,0.35);
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--toi-bg);
      color: var(--toi-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--toi-green);
      color: white;
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-title .dot {
      width: 10px; height: 10px;
      background: var(--toi-gold);
      border-radius: 50%;
      display: inline-block;
    }

    .header-badge {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── MAIN LAYOUT ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      gap: 1.25rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .page-heading {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--toi-green);
      line-height: 1.2;
    }

    .page-subheading {
      font-size: 0.9rem;
      color: #5a7060;
      margin-top: 4px;
    }

    /* ── SEARCH BAR ── */
    .search-wrap {
      position: relative;
      max-width: 480px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--toi-green);
      pointer-events: none;
      font-size: 1.1rem;
    }

    #search {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.8rem;
      border: 2px solid var(--toi-border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      background: white;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    #search:focus {
      border-color: var(--toi-green);
      box-shadow: 0 0 0 3px rgba(0,97,60,0.12);
    }

    #search::placeholder { color: #9ab09e; }

    /* ── SUGGESTIONS DROPDOWN ── */
    #suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: white;
      border: 1.5px solid var(--toi-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      z-index: 50;
      overflow: hidden;
      display: none;
    }

    .suggestion-item {
      padding: 0.65rem 1rem;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }

    .suggestion-item:hover, .suggestion-item.active {
      background: #e8f4ee;
      color: var(--toi-green);
    }

    .suggestion-item .s-icon { font-size: 0.85rem; color: var(--toi-green); }

    /* ── CONTENT ROW ── */
    .content-row {
      display: flex;
      gap: 1.25rem;
      flex: 1;
      min-height: 0;
    }

    /* ── MAP CONTAINER ── */
    .map-container {
      flex: 1;
      background: var(--toi-card);
      border-radius: var(--radius);
      border: 1.5px solid var(--toi-border);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      min-height: 420px;
    }

    .map-image-wrap {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #campus-map {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* map placeholder when no image */
    .map-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #e8f4ee 0%, #d4eadc 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #5a7060;
      font-size: 0.9rem;
      text-align: center;
      padding: 2rem;
    }

    .map-placeholder .placeholder-icon { font-size: 3rem; }
    .map-placeholder strong { color: var(--toi-green); font-size: 1rem; }

    /* ── PINS ── */
    .pins-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .pin {
      position: absolute;
      transform: translate(-50%, -100%);
      pointer-events: all;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.2s;
    }

    .pin:hover { transform: translate(-50%, -100%) scale(1.15); }

    .pin-icon {
      width: 28px; height: 28px;
      background: var(--pin-default);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2.5px solid white;
      box-shadow: 0 2px 8px var(--pin-shadow);
      transition: background 0.25s, box-shadow 0.25s, transform 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pin-label {
      margin-top: 4px;
      background: var(--toi-dark);
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }

    .pin:hover .pin-label,
    .pin.highlighted .pin-label { opacity: 1; transform: translateY(0); }

    .pin.highlighted .pin-icon {
      background: var(--pin-highlight);
      box-shadow: 0 0 0 5px rgba(242,169,0,0.3), 0 2px 12px rgba(242,169,0,0.5);
      transform: rotate(-45deg) scale(1.2);
    }

    .pin.highlighted { transform: translate(-50%, -100%) scale(1.2); z-index: 10; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .sidebar-card {
      background: var(--toi-card);
      border-radius: var(--radius);
      border: 1.5px solid var(--toi-border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .sidebar-card-header {
      background: var(--toi-green);
      color: white;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 0.65rem 1rem;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    /* result panel */
    #result-panel { display: none; }
    #result-panel .result-body { padding: 1rem; }
    #result-name {
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--toi-green);
      margin-bottom: 6px;
    }
    #result-desc {
      font-size: 0.85rem;
      color: #4a6050;
      line-height: 1.5;
    }
    .result-tag {
      display: inline-block;
      background: #e8f4ee;
      color: var(--toi-green);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 10px;
    }

    /* blocks list */
    .blocks-list { max-height: 340px; overflow-y: auto; }
    .blocks-list::-webkit-scrollbar { width: 4px; }
    .blocks-list::-webkit-scrollbar-track { background: transparent; }
    .blocks-list::-webkit-scrollbar-thumb { background: var(--toi-border); border-radius: 2px; }

    .block-item {
      padding: 0.6rem 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
      border-bottom: 1px solid #f0f4f0;
      transition: background 0.15s;
    }

    .block-item:last-child { border-bottom: none; }
    .block-item:hover { background: #e8f4ee; }
    .block-item.active { background: #d0ecdb; font-weight: 600; color: var(--toi-green); }

    .block-dot {
      width: 10px; height: 10px;
      background: var(--pin-default);
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .block-item.active .block-dot { background: var(--pin-highlight); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.78rem;
      color: #8aaa90;
      border-top: 1px solid var(--toi-border);
    }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      header { padding: 0 1rem; height: 56px; }
      .header-title { font-size: 1.1rem; }
      main { padding: 1rem; gap: 1rem; }
      .page-heading { font-size: 1.25rem; }
      .content-row { flex-direction: column; }
      .sidebar { width: 100%; }
      .map-container { min-height: 320px; }
      .blocks-list { max-height: 200px; }
    }

    @media (max-width: 400px) {
      .header-badge { display: none; }
      .header-title { font-size: 1rem; }
    }

    /* clear button */
    #clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #9ab09e;
      cursor: pointer;
      font-size: 1rem;
      display: none;
      padding: 2px;
      line-height: 1;
    }
    #clear-btn:hover { color: var(--toi-green); }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <span class="dot"></span>
    Toi-Ohomai – HUB
  </div>
  <span class="header-badge">Campus Map</span>
</header>

<main>
  <div>
    <div class="page-heading">Campus Map</div>
    <div class="page-subheading">Tauranga Campus — Find buildings and rooms</div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search for a block, e.g. B-Block…" autocomplete="off" />
    <button id="clear-btn" title="Clear search">✕</button>
    <div id="suggestions"></div>
  </div>

  <!-- Map + Sidebar -->
  <div class="content-row">

    <!-- Map -->
    <div class="map-container">
      <div class="map-image-wrap" id="map-wrap">
        <!-- Replace the div below with: <img id="campus-map" src="campus-map.jpg" alt="Tauranga Campus Map" /> -->
        <img id="campus-map" src="campus-map.jpg" alt="Tauranga Campus Map" />
        <div class="pins-layer" id="pins-layer"></div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">

      <!-- Result panel (shown on selection) -->
      <div class="sidebar-card" id="result-panel">
        <div class="sidebar-card-header">📍 Selected Block</div>
        <div class="result-body">
          <div id="result-name"></div>
          <div id="result-desc"></div>
          <span class="result-tag" id="result-tag"></span>
        </div>
      </div>

      <!-- All blocks list -->
      <div class="sidebar-card">
        <div class="sidebar-card-header">🏛️ All Blocks</div>
        <div class="blocks-list" id="blocks-list"></div>
      </div>

    </div>
  </div>
</main>

<footer>Toi Ohomai Institute of Technology &mdash; Student Hub &mdash; Campus Map Feature Prototype</footer>

<script>
  const blocks = [
    { name: 'A-Block', x: 52.7, y: 61.6, desc: 'Administration and student services. Includes the main reception and student finance office.' },
    { name: 'B-Block', x: 43.3, y: 61.6, desc: 'Lecture theatres and general classrooms. Home to several computing and IT labs.' },
    { name: 'C-Block', x: 34.9, y: 58.1, desc: 'Science and technology workshops. Includes specialised laboratory spaces.' },
    { name: 'D-Block', x: 31.8, y: 63.3, desc: 'Creative arts and design studios. Features large open studio spaces.' },
    { name: 'E-Block', x: 25.8, y: 64.8, desc: 'Engineering and trades workshops. Houses heavy machinery and practical workspaces.' },
    { name: 'G-Block', x: 19.9, y: 60.2, desc: 'General classrooms and tutorial rooms. Multi-purpose teaching spaces.' },
    { name: 'H-Block', x: 18.5, y: 48.8, desc: 'Health and nursing facilities. Includes simulation labs and clinical spaces.' },
    { name: 'J-Block', x: 8.2,  y: 36.9, desc: 'Sport and recreation centre. Includes gymnasium and changing facilities.' },
    { name: 'L-Block', x: 50.3, y: 42.7, desc: 'Library and learning hub. Quiet study areas, computer terminals, and printing.' },
    { name: 'M-Block', x: 31.8, y: 47.4, desc: 'Media and communications studios. Includes recording and broadcast facilities.' },
    { name: 'P-Block', x: 42.9, y: 48.2, desc: 'Performing arts and music spaces. Rehearsal rooms and performance venue.' },
    { name: 'R-Block', x: 27.2, y: 38.3, desc: 'Research centre. Postgraduate facilities and faculty offices.' },
    { name: 'S-Block', x: 80.7, y: 66.8, desc: 'Student services and support hub. Counselling, career services, and student union.' },
    { name: 'V-Block', x: 69.4, y: 65.0, desc: 'Vocational training centre. Trades and applied technology programmes.' },
    { name: 'W-Block', x: 80.3, y: 31.1, desc: 'Whanau and cultural support centre. Māori and Pasifika student services.' },
    { name: 'Z-Block', x: 93.6, y: 11.0, desc: 'Facilities and maintenance. Security office also located here.' },
  ];

  let selectedBlock = null;
  let devMode = false;

  const pinsLayer   = document.getElementById('pins-layer');
  const blocksList  = document.getElementById('blocks-list');
  const searchInput = document.getElementById('search');
  const suggestions = document.getElementById('suggestions');
  const clearBtn    = document.getElementById('clear-btn');
  const resultPanel = document.getElementById('result-panel');
  const resultName  = document.getElementById('result-name');
  const resultDesc  = document.getElementById('result-desc');
  const resultTag   = document.getElementById('result-tag');
  const mapWrap     = document.getElementById('map-wrap');

  // ── DEV MODE OVERLAY ──
  const devBanner = document.createElement('div');
  devBanner.style.cssText = `
    display:none; position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    background:#1a1a2e; color:#f2a900; font-family:monospace; font-size:0.85rem;
    padding:10px 20px; border-radius:8px; z-index:9999; text-align:center;
    box-shadow:0 4px 20px rgba(0,0,0,0.4); pointer-events:none;
  `;
  devBanner.innerHTML = '🛠️ DEV MODE — Click anywhere on the map to get coordinates';
  document.body.appendChild(devBanner);

  const devCoords = document.createElement('div');
  devCoords.style.cssText = `
    display:none; position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
    background:#1a1a2e; color:white; font-family:monospace; font-size:0.9rem;
    padding:8px 16px; border-radius:8px; z-index:9999; text-align:center;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);
  `;
  document.body.appendChild(devCoords);

  // crosshair cursor in dev mode
  const devStyle = document.createElement('style');
  devStyle.id = 'dev-style';
  document.head.appendChild(devStyle);

  document.addEventListener('keydown', e => {
    if (e.key === 'd' || e.key === 'D') {
      devMode = !devMode;
      devBanner.style.display = devMode ? 'block' : 'none';
      devCoords.style.display = 'none';
      devStyle.textContent = devMode ? '#map-wrap { cursor: crosshair !important; }' : '';
    }
  });

  mapWrap.addEventListener('click', e => {
    if (!devMode) return;
    const rect = mapWrap.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width  * 100).toFixed(1);
    const y = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1);
    devCoords.style.display = 'block';
    devCoords.innerHTML = `x: <strong>${x}</strong>, y: <strong>${y}</strong> &nbsp;—&nbsp; <span style="color:#aaa">click to copy</span>`;
    devCoords.style.cursor = 'pointer';
    devCoords.onclick = () => {
      navigator.clipboard.writeText(`x: ${x}, y: ${y}`);
      devCoords.innerHTML = `✅ Copied! x: <strong>${x}</strong>, y: <strong>${y}</strong>`;
    };
  });

  // ── BUILD PINS ──
  blocks.forEach((block, i) => {
    const pin = document.createElement('div');
    pin.className = 'pin';
    pin.id = `pin-${i}`;
    pin.style.left = block.x + '%';
    pin.style.top  = block.y + '%';
    pin.innerHTML  = `<div class="pin-icon"></div><div class="pin-label">${block.name}</div>`;
    pin.addEventListener('click', () => { if (!devMode) selectBlock(i); });
    pinsLayer.appendChild(pin);
  });

  // ── BUILD SIDEBAR LIST ──
  blocks.forEach((block, i) => {
    const item = document.createElement('div');
    item.className = 'block-item';
    item.id = `list-${i}`;
    item.innerHTML = `<span class="block-dot"></span>${block.name}`;
    item.addEventListener('click', () => selectBlock(i));
    blocksList.appendChild(item);
  });

  function selectBlock(i) {
    if (selectedBlock !== null) {
      document.getElementById(`pin-${selectedBlock}`)?.classList.remove('highlighted');
      document.getElementById(`list-${selectedBlock}`)?.classList.remove('active');
    }
    selectedBlock = i;
    document.getElementById(`pin-${i}`).classList.add('highlighted');
    const listItem = document.getElementById(`list-${i}`);
    listItem.classList.add('active');
    listItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    const b = blocks[i];
    resultName.textContent = b.name;
    resultDesc.textContent = b.desc;
    resultTag.textContent  = 'Tauranga Campus';
    resultPanel.style.display = 'block';

    searchInput.value = b.name;
    clearBtn.style.display = 'block';
    suggestions.style.display = 'none';
  }

  function clearSelection() {
    if (selectedBlock !== null) {
      document.getElementById(`pin-${selectedBlock}`)?.classList.remove('highlighted');
      document.getElementById(`list-${selectedBlock}`)?.classList.remove('active');
      selectedBlock = null;
    }
    resultPanel.style.display = 'none';
    searchInput.value = '';
    clearBtn.style.display = 'none';
    suggestions.style.display = 'none';
  }

  clearBtn.addEventListener('click', clearSelection);

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    clearBtn.style.display = q ? 'block' : 'none';
    if (!q) { suggestions.style.display = 'none'; return; }
    const matches = blocks.map((b, i) => ({ ...b, i })).filter(b => b.name.toLowerCase().includes(q));
    if (!matches.length) { suggestions.style.display = 'none'; return; }
    suggestions.innerHTML = matches.map(b =>
      `<div class="suggestion-item" data-index="${b.i}"><span class="s-icon">📍</span>${b.name}</div>`
    ).join('');
    suggestions.querySelectorAll('.suggestion-item').forEach(el => {
      el.addEventListener('click', () => selectBlock(+el.dataset.index));
    });
    suggestions.style.display = 'block';
  });

  searchInput.addEventListener('keydown', e => {
    const items = suggestions.querySelectorAll('.suggestion-item');
    const active = suggestions.querySelector('.suggestion-item.active');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const next = active ? active.nextElementSibling : items[0];
      active?.classList.remove('active');
      next?.classList.add('active');
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      const prev = active?.previousElementSibling;
      active?.classList.remove('active');
      prev?.classList.add('active');
    } else if (e.key === 'Enter') {
      const a = suggestions.querySelector('.suggestion-item.active') || suggestions.querySelector('.suggestion-item');
      if (a) selectBlock(+a.dataset.index);
    } else if (e.key === 'Escape') {
      clearSelection();
    }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-wrap')) suggestions.style.display = 'none';
  });
</script>
</body>
</html>
